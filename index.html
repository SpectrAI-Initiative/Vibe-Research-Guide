<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Research Guide</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --card: #f8fbff;
      --border: #d4ddea;
      --text: #142033;
      --muted: #5c6b80;
      --accent: #0a66c2;
      --accent-2: #009688;
      --accent-soft: linear-gradient(135deg, #e8f0ff 0%, #eefbf7 100%);
      --hero: linear-gradient(135deg, #0f172a 0%, #123f73 45%, #127f78 100%);
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }
    .lang-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }
    .lang-bar span {
      font-size: 0.9rem;
      color: var(--muted);
      margin-right: 0.5rem;
      align-self: center;
    }
    .lang-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.88);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .content { display: none; }
    .content.active { display: block; }
    h1 { font-size: 2.6rem; margin: 0 0 0.5rem; line-height: 1.1; }
    h2 {
      font-size: 1.45rem;
      margin-top: 2.4rem;
      padding-bottom: 0.35rem;
    }
    h3 { font-size: 1.1rem; margin-top: 1.4rem; }
    p { margin: 0.75rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    blockquote {
      margin: 1rem 0;
      padding: 0.8rem 1rem;
      border-left: 4px solid var(--accent-2);
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      border-radius: 0 14px 14px 0;
    }
    ul, ol { padding-left: 1.4rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.7rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: #eef4fb; }
    .badges { margin: 1rem 0; }
    .hero {
      background: var(--hero);
      color: #fff;
      padding: 2rem;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      margin-bottom: 2rem;
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      filter: blur(2px);
    }
    .hero p, .hero a { color: rgba(255,255,255,0.92); }
    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .hero-link {
      display: inline-block;
      padding: 0.6rem 0.9rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff;
      font-weight: 600;
    }
    .hero-link:hover { text-decoration: none; background: rgba(255,255,255,0.22); }
    .section-intro {
      color: var(--muted);
      max-width: 760px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1rem;
      margin: 1rem 0;
    }
    .card {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1rem 1.1rem;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }
    .card h3 { margin-top: 0; margin-bottom: 0.35rem; }
    .eyebrow {
      display: inline-block;
      margin-bottom: 0.5rem;
      padding: 0.22rem 0.55rem;
      border-radius: 999px;
      background: #e7f0fb;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .cta-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin: 1rem 0 0;
    }
    .cta-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.9rem;
      text-align: center;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
    }
    .callout {
      background: var(--accent-soft);
      border: 1px solid #c7d8ef;
      border-radius: 18px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .section-note { color: var(--muted); }
    @media (min-width: 720px) {
      .span-4 { grid-column: span 4; }
      .span-6 { grid-column: span 6; }
      .span-3 { grid-column: span 3; }
    }
    @media (max-width: 820px) {
      .cta-strip { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      body { padding: 1rem; }
      .hero { padding: 1.35rem; border-radius: 18px; }
      h1 { font-size: 2rem; }
      .cta-strip { grid-template-columns: 1fr; }
    }
    [dir="rtl"] { text-align: right; }
    [dir="rtl"] ul, [dir="rtl"] ol { padding-left: 0; padding-right: 1.4rem; }
    [dir="rtl"] blockquote {
      border-left: none;
      border-right: 4px solid var(--accent-2);
    }
  </style>
</head>
<body>
  <div class="lang-bar">
    <span>Language / 语言:</span>
    <button class="lang-btn active" data-lang="en">English</button>
    <button class="lang-btn" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="ko">한국어</button>
    <button class="lang-btn" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="de">Deutsch</button>
    <button class="lang-btn" data-lang="fr">Français</button>
    <button class="lang-btn" data-lang="es">Español</button>
    <button class="lang-btn" data-lang="it">Italiano</button>
    <button class="lang-btn" data-lang="pt">Português</button>
    <button class="lang-btn" data-lang="ar">العربية</button>
    <button class="lang-btn" data-lang="th">ไทย</button>
    <button class="lang-btn" data-lang="vi">Tiếng Việt</button>
    <button class="lang-btn" data-lang="ru">Русский</button>
  </div>

  <div id="content-en" class="content active" data-lang="en"></div>
  <div id="content-zh" class="content" data-lang="zh"></div>
  <div id="content-ko" class="content" data-lang="ko"></div>
  <div id="content-ja" class="content" data-lang="ja"></div>
  <div id="content-de" class="content" data-lang="de"></div>
  <div id="content-fr" class="content" data-lang="fr"></div>
  <div id="content-es" class="content" data-lang="es"></div>
  <div id="content-it" class="content" data-lang="it"></div>
  <div id="content-pt" class="content" data-lang="pt"></div>
  <div id="content-ar" class="content" data-lang="ar" dir="rtl"></div>
  <div id="content-th" class="content" data-lang="th"></div>
  <div id="content-vi" class="content" data-lang="vi"></div>
  <div id="content-ru" class="content" data-lang="ru"></div>

  <script src="files/index-translations.js"></script>
</body>
</html>
